name: Build tt-metal on community distros

run-name: Build tt-metal (${{ inputs.tt_metal_ref }}) on ${{ inputs.target_os }}

on:
  workflow_dispatch:
    inputs:
      target_os:
        description: 'Target distro/version, or "all" to run the full matrix'
        required: true
        type: choice
        options:
          - all
          - linuxmint-22.3
          - linuxmint-22.2
          - linuxmint-22.1
          - linuxmint-21.3
          - rocky-10
          - rocky-9
          - debian-13
          - debian-12
        default: 'all'
      tt_metal_repo:
        description: 'Upstream tt-metal repository (owner/name)'
        required: true
        default: 'tenstorrent/tt-metal'
      tt_metal_ref:
        description: 'Branch, tag or commit SHA to build'
        required: true
        default: 'main'

permissions:
  contents: read

# Pinned tt-installer release used by the install-phase verification.
# Bump this manually after reviewing the upstream release notes; we
# pin so that compatibility regressions can only be introduced by
# changes in this repo, in tt-metal, or in the target distro images.
env:
  TT_INSTALLER_VERSION: v2.2.1

# Only one full-matrix run at a time.  Older runs are cancelled so the
# README auto-update never sees a stale matrix overwriting a newer one.
concurrency:
  group: build-tt-metal-${{ inputs.target_os }}
  cancel-in-progress: false

jobs:
  setup:
    name: Compute matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - name: Choose target OSes
        id: set
        env:
          TARGET_OS: ${{ inputs.target_os }}
        run: |
          set -eu
          if [ -z "${TARGET_OS}" ] || [ "${TARGET_OS}" = "all" ]; then
            matrix='{"target_os":["linuxmint-21.3","linuxmint-22.1","linuxmint-22.2","linuxmint-22.3","rocky-9","rocky-10","debian-12","debian-13"]}'
          else
            matrix=$(printf '{"target_os":["%s"]}' "${TARGET_OS}")
          fi
          echo "matrix=${matrix}" >> "$GITHUB_OUTPUT"
          echo "Selected matrix: ${matrix}"

  build:
    needs: setup
    name: ${{ matrix.target_os }} / tt-metal@${{ inputs.tt_metal_ref }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}

    steps:
      - name: Checkout this repository
        uses: actions/checkout@v5

      - name: Resolve OS path
        id: os
        env:
          TARGET_OS: ${{ matrix.target_os }}
        run: |
          set -eu
          target="${TARGET_OS}"
          # Split "<distro>-<version>" -> distro / version. version may contain dots.
          distro="${target%%-*}"
          version="${target#*-}"
          os_dir="os/${distro}/${version}"
          if [ ! -f "${os_dir}/Dockerfile" ]; then
            echo "::error::Dockerfile not found at ${os_dir}/Dockerfile"
            exit 1
          fi
          echo "distro=${distro}"     >> "$GITHUB_OUTPUT"
          echo "version=${version}"   >> "$GITHUB_OUTPUT"
          echo "os_dir=${os_dir}"     >> "$GITHUB_OUTPUT"
          echo "image_tag=ttmcdm-${distro}-${version}:ci" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build OS base image (cached)
        uses: docker/build-push-action@v5
        with:
          context: ${{ steps.os.outputs.os_dir }}
          file: ${{ steps.os.outputs.os_dir }}/Dockerfile
          load: true
          tags: ${{ steps.os.outputs.image_tag }}
          cache-from: type=gha,scope=${{ matrix.target_os }}
          cache-to: type=gha,scope=${{ matrix.target_os }},mode=max

      - name: Verify base image identity
        run: |
          set -eu
          docker run --rm "${{ steps.os.outputs.image_tag }}" cat /etc/os-release | tee os-release.txt
          # Sanity check: the file should at least carry an ID or NAME field.
          grep -E '^(ID|NAME)=' os-release.txt >/dev/null

      - name: Checkout tt-metal
        uses: actions/checkout@v5
        with:
          repository: ${{ inputs.tt_metal_repo }}
          path: tt-metal
          ref: ${{ inputs.tt_metal_ref }}
          submodules: recursive
          fetch-depth: 0
          fetch-tags: true

      - name: Record tt-metal commit
        id: ttmetal
        working-directory: tt-metal
        run: |
          sha=$(git rev-parse HEAD)
          echo "sha=${sha}" >> "$GITHUB_OUTPUT"
          echo "tt-metal HEAD: ${sha}"

      - name: Build tt-metal inside container
        id: build
        run: |
          set -o pipefail
          mkdir -p logs

          # Determine which (if any) patches we have for this distro.
          # When patches/<id>/ contains *.patch files, we run a "vanilla"
          # pre-flight pass first to record whether the unpatched
          # install_dependencies.sh from tt-metal can complete on this
          # distro.  This populates the "Vanilla" column in the
          # compatibility table and makes the contribution case for the
          # patches concrete.
          os_id=$(grep -E '^ID=' os-release.txt | head -n1 | cut -d= -f2 | tr -d '"')
          patch_dir="patches/${os_id}"
          if [ -d "$patch_dir" ]; then
            patch_count=$(find "$patch_dir" -maxdepth 1 -name '*.patch' -type f | wc -l)
          else
            patch_count=0
          fi
          patch_count=${patch_count:-0}
          echo "patch_count=$patch_count" >> "$GITHUB_OUTPUT"

          vanilla_status="na"
          if [ "$patch_count" -gt 0 ]; then
            echo "::group::Vanilla pre-flight (no patches)"
            # In the vanilla pass we only run install_dependencies.sh.
            # This is the script the patches actually modify, and on the
            # distros we currently target (Debian 12/13) it is also where
            # the unpatched script fails.  Skipping build_metal.sh here
            # keeps CI time bounded; in the rare case where vanilla
            # install_dependencies.sh succeeds but build_metal.sh would
            # fail because of one of our patches, the patched run below
            # will catch it.
            set +e
            docker run --rm \
              -v "${PWD}/tt-metal:/workspace/tt-metal" \
              -w /workspace/tt-metal \
              -e TT_METAL_HOME=/workspace/tt-metal \
              "${{ steps.os.outputs.image_tag }}" \
              bash -lc '
                set -eux
                git config --global --add safe.directory "*"
                cat /etc/os-release
                ./install_dependencies.sh --docker
              ' 2>&1 | tee logs/build-vanilla.log
            vanilla_rc=${PIPESTATUS[0]}
            set -e
            if [ "$vanilla_rc" -eq 0 ]; then
              vanilla_status="success"
            else
              vanilla_status="failure"
            fi
            echo "Vanilla install_dependencies.sh: $vanilla_status (rc=$vanilla_rc)"
            echo "::endgroup::"
          else
            echo "No patches under $patch_dir; vanilla pass is identical to the patched pass."
          fi
          echo "vanilla_status=$vanilla_status" >> "$GITHUB_OUTPUT"

          echo "::group::Patched build"
          docker run --rm \
            -v "${PWD}/tt-metal:/workspace/tt-metal" \
            -v "${PWD}/patches:/patches:ro" \
            -w /workspace/tt-metal \
            -e TT_METAL_HOME=/workspace/tt-metal \
            "${{ steps.os.outputs.image_tag }}" \
            bash -lc '
              set -eux
              # Tell git that the bind-mounted source tree (owned by the host runner uid)
              # is safe to use as root inside the container. Without this, git refuses to
              # operate on the directory and tt-metal cannot determine its version, which
              # later causes write_basic_package_version_file() to fail with
              # "No VERSION specified".
              git config --global --add safe.directory "*"
              cat /etc/os-release
              # Apply OS-specific patches to tt-metal that are required for the
              # build/install scripts to run on the target distro.  Patches are
              # kept as standalone files under patches/<distro>/ so that they
              # can be reviewed individually and later contributed upstream.
              # See patches/README.md for the policy and per-patch status.
              . /etc/os-release
              patch_dir="/patches/${ID:-unknown}"
              if [ -d "$patch_dir" ]; then
                shopt -s nullglob
                patches=("$patch_dir"/*.patch)
                if [ ${#patches[@]} -gt 0 ]; then
                  echo "Applying ${#patches[@]} patch(es) from $patch_dir"
                  for p in "${patches[@]}"; do
                    echo "--- $p ---"
                    git apply --verbose "$p"
                  done
                fi
              fi
              ./install_dependencies.sh --docker
              ./build_metal.sh
            ' 2>&1 | tee logs/build.log
          echo "::endgroup::"

      - name: Verify build artifacts
        id: artifacts
        run: |
          set -eu
          # tt-metal's build_metal.sh writes to a configuration-specific
          # directory such as build_Release/ and creates build/ as a
          # symlink pointing at it. We want to accept either layout, and
          # we must follow symlinks when counting files (find's default
          # -P does not descend into symlinked starting points).
          shopt -s nullglob
          candidates=(tt-metal/build tt-metal/build_Release tt-metal/build_Debug tt-metal/build_RelWithDebInfo tt-metal/built)
          for d in "${candidates[@]}"; do
            if [ -e "$d" ]; then
              # Resolve symlinks so we report and count the real directory.
              real=$(readlink -f "$d")
              if [ -d "$real" ]; then
                count=$(find -L "$real" -type f | wc -l)
                echo "Found artifact directory: $d -> $real (files: $count)"
                if [ "$count" -gt 0 ]; then
                  # Sanity check: the main libtt_metal.so should exist.
                  if find -L "$real" -type f -name 'libtt_metal.so*' | grep -q .; then
                    echo "  libtt_metal.so present"
                  else
                    echo "::warning::libtt_metal.so not found under $real"
                  fi
                  echo "found_dir=$d" >> "$GITHUB_OUTPUT"
                  echo "real_dir=$real" >> "$GITHUB_OUTPUT"
                  exit 0
                fi
              fi
            fi
          done
          echo "::error::No build artifacts found under tt-metal/build*, tt-metal/built"
          ls -la tt-metal/ || true
          exit 1

      - name: Run tt-installer (install phase)
        id: install
        # Install-phase verification is opt-in per OS. tt-installer's
        # upstream compatibility doc lists Debian 13 as officially
        # supported, so that is the first OS we wire up. Other OSes
        # in the matrix will be enabled in follow-up PRs once we have
        # a clear picture of any patches they need.
        if: matrix.target_os == 'debian-13'
        continue-on-error: true
        env:
          IMAGE_TAG: ${{ steps.os.outputs.image_tag }}
          INSTALLER_VERSION: ${{ env.TT_INSTALLER_VERSION }}
        run: |
          set -o pipefail
          mkdir -p logs

          echo "::group::tt-installer ${INSTALLER_VERSION} (fresh container)"
          # Run the installer in a *fresh* container of the same base
          # image so that any side-effects of tt-metal's
          # install_dependencies.sh do not influence the result. The
          # post-condition (Tenstorrent apt source registered) is
          # checked inside the same `docker run` since `--rm` removes
          # the container on exit.
          set +e
          docker run --rm \
            -e INSTALLER_VERSION="${INSTALLER_VERSION}" \
            "${IMAGE_TAG}" \
            bash -lc '
              set -u
              cat /etc/os-release
              # Debian 13 base image does not ship curl/sudo by default.
              apt-get update
              DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
                curl ca-certificates sudo

              url="https://github.com/tenstorrent/tt-installer/releases/download/${INSTALLER_VERSION}/install.sh"
              curl -fL --retry 3 --retry-delay 5 -o /tmp/install.sh "$url"
              chmod +x /tmp/install.sh

              set +e
              # Skip everything that needs hardware, kernel headers or
              # external image pulls. We only want to validate that the
              # installer runs to completion and registers the
              # Tenstorrent package repository on this distro.
              /tmp/install.sh \
                --mode-non-interactive \
                --no-install-kmd \
                --no-install-hugepages \
                --install-container-runtime=no \
                --no-install-tt-flash \
                --no-install-tt-smi \
                --no-install-tt-topology \
                --no-install-sfpi \
                --no-install-inference-server \
                --no-install-studio \
                --no-install-metalium-container \
                --no-install-forge-container \
                --update-firmware=off \
                --reboot-option=never
              installer_rc=$?
              set -e

              # Post-condition: the installer must register the
              # Tenstorrent package source. Search by content (not
              # filename) across all the locations apt looks at, and
              # also under /etc/yum.repos.d for the future RPM
              # rollout.
              # NOTE: `grep -R` exits with status 2 when any of the
              # listed paths is missing -- on Debian /etc/apt/sources.list
              # is absent and /etc/yum.repos.d does not exist -- so do
              # not branch on its exit code. Capture matches into a
              # file and inspect that.
              : > /tmp/repo-hits
              find /etc/apt/sources.list \
                   /etc/apt/sources.list.d \
                   /etc/yum.repos.d \
                   -type f 2>/dev/null \
                | xargs -r grep -li "tenstorrent" 2>/dev/null \
                > /tmp/repo-hits || true
              if [ -s /tmp/repo-hits ]; then
                repo_files=$(tr "\n" "," < /tmp/repo-hits | sed "s/,$//")
                repo_present=true
              else
                repo_files=""
                repo_present=false
              fi

              echo "INSTALLER_RC=${installer_rc}"
              echo "REPO_PRESENT=${repo_present}"
              echo "REPO_FILES=${repo_files}"
              exit "${installer_rc}"
            ' 2>&1 | tee logs/install-tt-installer.log
          installer_overall_rc=${PIPESTATUS[0]}
          set -e
          echo "::endgroup::"

          # Parse the structured markers from the captured log so that
          # the workflow step output reflects the in-container state
          # even if `--rm` later wiped the container.
          repo_present=$(grep -E '^REPO_PRESENT=' logs/install-tt-installer.log \
                         | tail -n1 | cut -d= -f2)
          repo_files=$(grep -E '^REPO_FILES='   logs/install-tt-installer.log \
                       | tail -n1 | cut -d= -f2-)
          repo_present=${repo_present:-false}
          if [ "$installer_overall_rc" -eq 0 ] && [ "$repo_present" = "true" ]; then
            install_status=success
          else
            install_status=failure
          fi
          echo "install_status=$install_status"           >> "$GITHUB_OUTPUT"
          echo "install_repo_present=$repo_present"       >> "$GITHUB_OUTPUT"
          echo "install_repo_files=$repo_files"           >> "$GITHUB_OUTPUT"
          echo "install_installer_rc=$installer_overall_rc" >> "$GITHUB_OUTPUT"
          echo "installer_version=${INSTALLER_VERSION}"   >> "$GITHUB_OUTPUT"
          echo "tt-installer ${INSTALLER_VERSION}: $install_status (rc=$installer_overall_rc, repo_present=$repo_present)"

      - name: Write status JSON
        if: always()
        run: |
          set -eu
          mkdir -p logs
          status="${{ job.status }}"
          vanilla="${{ steps.build.outputs.vanilla_status }}"
          patch_count="${{ steps.build.outputs.patch_count }}"
          install_status="${{ steps.install.outputs.install_status }}"
          install_repo_present="${{ steps.install.outputs.install_repo_present }}"
          install_repo_files="${{ steps.install.outputs.install_repo_files }}"
          install_rc="${{ steps.install.outputs.install_installer_rc }}"
          installer_version="${{ steps.install.outputs.installer_version }}"
          # Defaults if the build step did not run far enough to set
          # outputs (e.g. checkout failed).
          vanilla="${vanilla:-na}"
          patch_count="${patch_count:-0}"
          # When the install step is skipped (most OSes today) we
          # emit "na" rather than "skipped" so that the table renders
          # an explicit n/a marker rather than a "scheduled" hourglass.
          install_status="${install_status:-na}"
          # JSON booleans/null for repo_present so old artifacts
          # remain easy to filter.
          if [ -z "${install_repo_present}" ]; then
            install_repo_present_json=null
          elif [ "${install_repo_present}" = "true" ]; then
            install_repo_present_json=true
          else
            install_repo_present_json=false
          fi
          install_rc="${install_rc:-}"
          if [ -z "${install_rc}" ]; then
            install_rc_json=null
          else
            install_rc_json=${install_rc}
          fi
          cat > logs/status.json <<EOF
          {
            "target_os": "${{ matrix.target_os }}",
            "distro":    "${{ steps.os.outputs.distro }}",
            "version":   "${{ steps.os.outputs.version }}",
            "tt_metal_repo": "${{ inputs.tt_metal_repo }}",
            "tt_metal_ref":  "${{ inputs.tt_metal_ref }}",
            "tt_metal_sha":  "${{ steps.ttmetal.outputs.sha }}",
            "run_id":   "${{ github.run_id }}",
            "run_url":  "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "status":   "${status}",
            "vanilla_status": "${vanilla}",
            "patch_count":    ${patch_count},
            "install_status": "${install_status}",
            "install_repo_present": ${install_repo_present_json},
            "install_repo_files":   "${install_repo_files}",
            "install_installer_rc": ${install_rc_json},
            "installer_version":    "${installer_version}",
            "artifact_dir": "${{ steps.artifacts.outputs.found_dir }}"
          }
          EOF
          cat logs/status.json

      - name: Upload logs and status
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.target_os }}-${{ github.run_id }}
          path: |
            logs/
            os-release.txt
          if-no-files-found: warn
          retention-days: 30

  update-compat-table:
    name: Update README compatibility table
    needs: [setup, build]
    if: always() && github.event_name == 'workflow_dispatch' && inputs.target_os == 'all'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: _artifacts
          # default merge-multiple: false -> each artifact lives in its own subdir,
          # which is what update_compat_table.py expects.

      - name: Refresh compatibility table
        run: |
          set -eu
          python3 scripts/update_compat_table.py \
            --artifacts-dir _artifacts \
            --require-os linuxmint-21.3 linuxmint-22.1 linuxmint-22.2 linuxmint-22.3 rocky-9 rocky-10 debian-12 debian-13

      - name: Show diff
        run: |
          git --no-pager diff --stat -- README.md || true
          git --no-pager diff -- README.md || true

      - name: Open PR if README changed
        uses: peter-evans/create-pull-request@v6
        with:
          branch: bot/update-compat-table
          base: main
          title: "chore: refresh compatibility table (run ${{ github.run_id }})"
          commit-message: |
            chore: refresh compatibility table from run ${{ github.run_id }}

            Auto-generated by .github/workflows/build-tt-metal.yaml.
          body: |
            Auto-generated from workflow run [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).

            This PR refreshes the `<!-- COMPAT_TABLE_START -->` / `<!-- COMPAT_TABLE_END -->` block in `README.md` based on the per-OS `status.json` files produced by the matrix build.
          delete-branch: true
          add-paths: README.md
          author: "tt-metal-community-bot <bot@users.noreply.github.com>"
          committer: "tt-metal-community-bot <bot@users.noreply.github.com>"
