name: Build tt-metal on community distros

run-name: Build tt-metal (${{ inputs.tt_metal_ref || 'main' }}) on ${{ inputs.target_os || 'all' }}

on:
  workflow_dispatch:
    inputs:
      target_os:
        description: 'Target distro/version, or "all" to run the full matrix'
        required: true
        type: choice
        options:
          - all
          - linuxmint-22.3
          - linuxmint-22.2
          - linuxmint-22.1
          - linuxmint-21.3
          - ubuntu-26.04
          - rocky-10
          - rocky-9
          - debian-13
          - debian-12
        default: 'all'
      tt_metal_repo:
        description: 'Upstream tt-metal repository (owner/name)'
        required: true
        default: 'tenstorrent/tt-metal'
      tt_metal_ref:
        description: 'Branch, tag or commit SHA to build'
        required: true
        default: 'main'
  schedule:
    # Weekly full-matrix guardrail run.  Use a non-round UTC minute to avoid
    # the busiest GitHub Actions scheduling window.
    - cron: '17 18 * * 0'

permissions:
  contents: read

# Pinned tt-installer release used by the install-phase verification.
# Bump these manually after reviewing the upstream release notes; we
# pin so that compatibility regressions can only be introduced by
# changes in this repo, in tt-metal, or in the target distro images.
env:
  TT_INSTALLER_VERSION: v3.4.0
  # sha256 of the released install.sh tarball asset for v3.4.0 -- pinned
  # so the install-phase cannot silently shift if upstream re-tags.
  TT_INSTALLER_SHA256: 7db71e11ba5ada508377f58c8afee187422a5c4629c11be873a881d17c805d3c
  # sha256 of install.m4 at refs/tags/v3.4.0 -- the source the patches
  # in patches/<distro>/installer/ are written against. If this hash
  # changes the patches need re-validating.
  TT_INSTALLER_M4_SHA256: 4f75260cd94d8aa878f0f0a702d26beb58680e0d7cc8a46d26d3c93e85a235ae

# Only one run per target selection at a time.  Runs are not cancelled because
# a full matrix is expensive and partial results are still useful for debugging.
concurrency:
  group: build-tt-metal-${{ inputs.target_os || 'all' }}
  cancel-in-progress: false

jobs:
  setup:
    name: Compute matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - name: Choose target OSes
        id: set
        env:
          TARGET_OS: ${{ inputs.target_os || 'all' }}
        run: |
          set -eu
          if [ -z "${TARGET_OS}" ] || [ "${TARGET_OS}" = "all" ]; then
            matrix='{"target_os":["linuxmint-21.3","linuxmint-22.1","linuxmint-22.2","linuxmint-22.3","ubuntu-26.04","rocky-9","rocky-10","debian-12","debian-13"]}'
          else
            matrix=$(printf '{"target_os":["%s"]}' "${TARGET_OS}")
          fi
          echo "matrix=${matrix}" >> "$GITHUB_OUTPUT"
          echo "Selected matrix: ${matrix}"

  build:
    needs: setup
    name: ${{ matrix.target_os }} / tt-metal@${{ inputs.tt_metal_ref || 'main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}

    steps:
      - name: Checkout this repository
        uses: actions/checkout@v5

      - name: Resolve OS path
        id: os
        env:
          TARGET_OS: ${{ matrix.target_os }}
        run: |
          set -eu
          target="${TARGET_OS}"
          # Split "<distro>-<version>" -> distro / version. version may contain dots.
          distro="${target%%-*}"
          version="${target#*-}"
          os_dir="os/${distro}/${version}"
          if [ ! -f "${os_dir}/Dockerfile" ]; then
            echo "::error::Dockerfile not found at ${os_dir}/Dockerfile"
            exit 1
          fi
          echo "distro=${distro}"     >> "$GITHUB_OUTPUT"
          echo "version=${version}"   >> "$GITHUB_OUTPUT"
          echo "os_dir=${os_dir}"     >> "$GITHUB_OUTPUT"
          echo "image_tag=ttmcdm-${distro}-${version}:ci" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build OS base image (cached)
        uses: docker/build-push-action@v7
        with:
          context: ${{ steps.os.outputs.os_dir }}
          file: ${{ steps.os.outputs.os_dir }}/Dockerfile
          load: true
          tags: ${{ steps.os.outputs.image_tag }}
          cache-from: type=gha,scope=${{ matrix.target_os }}
          cache-to: type=gha,scope=${{ matrix.target_os }},mode=max

      - name: Verify base image identity
        run: |
          set -eu
          docker run --rm "${{ steps.os.outputs.image_tag }}" cat /etc/os-release | tee os-release.txt
          # Sanity check: the file should at least carry an ID or NAME field.
          grep -E '^(ID|NAME)=' os-release.txt >/dev/null

      - name: Checkout tt-metal
        uses: actions/checkout@v5
        with:
          repository: ${{ inputs.tt_metal_repo || 'tenstorrent/tt-metal' }}
          path: tt-metal
          ref: ${{ inputs.tt_metal_ref || 'main' }}
          submodules: recursive
          fetch-depth: 0
          fetch-tags: true

      - name: Record tt-metal commit
        id: ttmetal
        working-directory: tt-metal
        run: |
          sha=$(git rev-parse HEAD)
          echo "sha=${sha}" >> "$GITHUB_OUTPUT"
          echo "tt-metal HEAD: ${sha}"

      - name: Build tt-metal inside container
        id: build
        run: |
          set -o pipefail
          mkdir -p logs

          # Determine which (if any) patches we have for this distro.
          # When patches/<id>/ contains *.patch files, we run a "vanilla"
          # pre-flight pass first to record whether the unpatched
          # install_dependencies.sh from tt-metal can complete on this
          # distro.  This populates the "Vanilla" column in the
          # compatibility table and makes the contribution case for the
          # patches concrete.
          os_id=$(grep -E '^ID=' os-release.txt | head -n1 | cut -d= -f2 | tr -d '"')
          patch_dir="patches/${os_id}"
          if [ -d "$patch_dir" ]; then
            patch_count=$(find "$patch_dir" -maxdepth 1 -name '*.patch' -type f | wc -l)
          else
            patch_count=0
          fi
          patch_count=${patch_count:-0}
          echo "patch_count=$patch_count" >> "$GITHUB_OUTPUT"

          vanilla_status="na"
          if [ "$patch_count" -gt 0 ]; then
            echo "::group::Vanilla pre-flight (no patches)"
            # In the vanilla pass we only run install_dependencies.sh.
            # This is the script the patches actually modify, and on the
            # distros we currently target (Debian 12/13) it is also where
            # the unpatched script fails.  Skipping build_metal.sh here
            # keeps CI time bounded; in the rare case where vanilla
            # install_dependencies.sh succeeds but build_metal.sh would
            # fail because of one of our patches, the patched run below
            # will catch it.
            set +e
            docker run --rm \
              -v "${PWD}/tt-metal:/workspace/tt-metal" \
              -w /workspace/tt-metal \
              -e TT_METAL_HOME=/workspace/tt-metal \
              "${{ steps.os.outputs.image_tag }}" \
              bash -lc '
                set -ux
                git config --global --add safe.directory "*"
                cat /etc/os-release
                ./install_dependencies.sh
                deps_rc=$?
                echo "__TTMCDM_VANILLA_DEPS_RC=$deps_rc"
                exit "$deps_rc"
              ' 2>&1 | tee logs/build-vanilla.log
            vanilla_rc=${PIPESTATUS[0]}
            set -e
            if [ "$vanilla_rc" -eq 0 ]; then
              vanilla_status="success"
              vanilla_failure_stage="na"
            else
              vanilla_status="failure"
              vanilla_failure_stage="deps"
            fi
            echo "Vanilla install_dependencies.sh: $vanilla_status (rc=$vanilla_rc)"
            echo "::endgroup::"
          else
            echo "No patches under $patch_dir; vanilla pass is identical to the patched pass."
            vanilla_failure_stage="na"
          fi
          echo "vanilla_status=$vanilla_status" >> "$GITHUB_OUTPUT"
          echo "vanilla_failure_stage=$vanilla_failure_stage" >> "$GITHUB_OUTPUT"

          echo "::group::Patched build"
          set +e
          docker run --rm \
            -v "${PWD}/tt-metal:/workspace/tt-metal" \
            -v "${PWD}/patches:/patches:ro" \
            -w /workspace/tt-metal \
            -e TT_METAL_HOME=/workspace/tt-metal \
            "${{ steps.os.outputs.image_tag }}" \
            bash -lc '
              set -ux
              # Tell git that the bind-mounted source tree (owned by the host runner uid)
              # is safe to use as root inside the container. Without this, git refuses to
              # operate on the directory and tt-metal cannot determine its version, which
              # later causes write_basic_package_version_file() to fail with
              # "No VERSION specified".
              git config --global --add safe.directory "*" || exit $?
              cat /etc/os-release
              # Apply OS-specific patches to tt-metal that are required for the
              # build/install scripts to run on the target distro.  Patches are
              # kept as standalone files under patches/<distro>/ so that they
              # can be reviewed individually and later contributed upstream.
              # See patches/README.md for the policy and per-patch status.
              . /etc/os-release
              patch_dir="/patches/${ID:-unknown}"
              patch_rc=0
              if [ -d "$patch_dir" ]; then
                shopt -s nullglob
                patches=("$patch_dir"/*.patch)
                if [ ${#patches[@]} -gt 0 ]; then
                  echo "Applying ${#patches[@]} patch(es) from $patch_dir"
                  for p in "${patches[@]}"; do
                    echo "--- $p ---"
                    git apply --verbose "$p" || { patch_rc=$?; break; }
                  done
                fi
              fi
              echo "__TTMCDM_PATCH_RC=$patch_rc"
              if [ "$patch_rc" -ne 0 ]; then
                exit "$patch_rc"
              fi
              echo "__TTMCDM_STAGE=deps"
              # NOTE: install_dependencies.sh is intentionally invoked WITHOUT
              # --docker. The upstream --docker mode skips installing CMake,
              # SFPI and MPI/ULFM (it assumes a prebuilt tool image provides
              # them). Our community-distro base images do not, so we run the
              # full host install path to get cmake/clang/sfpi/mpi for the build.
              ./install_dependencies.sh
              deps_rc=$?
              echo "__TTMCDM_DEPS_RC=$deps_rc"
              if [ "$deps_rc" -ne 0 ]; then
                exit "$deps_rc"
              fi
              echo "__TTMCDM_STAGE=build"
              ./build_metal.sh
              build_rc=$?
              echo "__TTMCDM_BUILD_RC=$build_rc"
              exit "$build_rc"
            ' 2>&1 | tee logs/build.log
          patched_rc=${PIPESTATUS[0]}
          set -e

          rc_to_status() {
            if [ -z "$1" ]; then
              printf 'skipped'
            elif [ "$1" -eq 0 ]; then
              printf 'success'
            else
              printf 'failure'
            fi
          }
          patch_rc=$(sed -n 's/^__TTMCDM_PATCH_RC=//p' logs/build.log | tail -n1)
          deps_rc=$(sed -n 's/^__TTMCDM_DEPS_RC=//p' logs/build.log | tail -n1)
          build_rc=$(sed -n 's/^__TTMCDM_BUILD_RC=//p' logs/build.log | tail -n1)
          patch_status=$(rc_to_status "$patch_rc")
          deps_status=$(rc_to_status "$deps_rc")
          build_status=$(rc_to_status "$build_rc")
          failure_stage="na"
          if [ "$patch_status" = "failure" ]; then
            failure_stage="patch"
          elif [ "$deps_status" = "failure" ]; then
            failure_stage="deps"
          elif [ "$build_status" = "failure" ]; then
            failure_stage="build"
          elif [ "$patched_rc" -ne 0 ]; then
            failure_stage="build"
            if [ "$patch_status" = "skipped" ]; then
              failure_stage="patch"
              patch_status="failure"
            fi
          fi

          echo "patch_status=$patch_status" >> "$GITHUB_OUTPUT"
          echo "deps_status=$deps_status" >> "$GITHUB_OUTPUT"
          echo "build_status=$build_status" >> "$GITHUB_OUTPUT"
          echo "failure_stage=$failure_stage" >> "$GITHUB_OUTPUT"
          echo "::endgroup::"
          if [ "$patched_rc" -ne 0 ]; then
            exit "$patched_rc"
          fi

      - name: Verify build artifacts
        id: artifacts
        run: |
          set -eu
          # tt-metal's build_metal.sh writes to a configuration-specific
          # directory such as build_Release/ and creates build/ as a
          # symlink pointing at it. We want to accept either layout, and
          # we must follow symlinks when counting files (find's default
          # -P does not descend into symlinked starting points).
          shopt -s nullglob
          candidates=(tt-metal/build tt-metal/build_Release tt-metal/build_Debug tt-metal/build_RelWithDebInfo tt-metal/built)
          for d in "${candidates[@]}"; do
            if [ -e "$d" ]; then
              # Resolve symlinks so we report and count the real directory.
              real=$(readlink -f "$d")
              if [ -d "$real" ]; then
                count=$(find -L "$real" -type f | wc -l)
                echo "Found artifact directory: $d -> $real (files: $count)"
                if [ "$count" -gt 0 ]; then
                  # Sanity check: the main libtt_metal.so should exist.
                  if find -L "$real" -type f -name 'libtt_metal.so*' | grep -q .; then
                    echo "  libtt_metal.so present"
                  else
                    echo "::warning::libtt_metal.so not found under $real"
                  fi
                  echo "found_dir=$d" >> "$GITHUB_OUTPUT"
                  echo "real_dir=$real" >> "$GITHUB_OUTPUT"
                  exit 0
                fi
              fi
            fi
          done
          echo "::error::No build artifacts found under tt-metal/build*, tt-metal/built"
          ls -la tt-metal/ || true
          exit 1

      - name: Prepare install.sh variants
        id: install-prep
        # Run install-phase verification on every wired-up OS. The prep
        # step downloads the released install.sh (pinned by sha256) and,
        # for OSes with patches under patches/<distro>/installer/,
        # splices the patched install_tt_repos block (regenerated from
        # install.m4 via argbash) into the released install.sh.
        if: matrix.target_os == 'debian-12' || matrix.target_os == 'debian-13' || matrix.target_os == 'rocky-9' || matrix.target_os == 'rocky-10' || matrix.target_os == 'linuxmint-21.3' || matrix.target_os == 'linuxmint-22.1' || matrix.target_os == 'linuxmint-22.2' || matrix.target_os == 'linuxmint-22.3' || matrix.target_os == 'ubuntu-26.04'
        env:
          INSTALLER_VERSION:    ${{ env.TT_INSTALLER_VERSION }}
          INSTALLER_SHA256:     ${{ env.TT_INSTALLER_SHA256 }}
          INSTALLER_M4_SHA256:  ${{ env.TT_INSTALLER_M4_SHA256 }}
          DISTRO:               ${{ steps.os.outputs.distro }}
        run: |
          chmod +x scripts/install-phase-prep.sh
          scripts/install-phase-prep.sh \
            "${DISTRO}" \
            "${INSTALLER_VERSION}" \
            "${INSTALLER_SHA256}" \
            "${INSTALLER_M4_SHA256}" \
            patches

      - name: Run tt-installer (vanilla)
        id: install-vanilla
        if: steps.install-prep.outcome == 'success'
        continue-on-error: true
        env:
          IMAGE_TAG:         ${{ steps.os.outputs.image_tag }}
          INSTALLER_VERSION: ${{ env.TT_INSTALLER_VERSION }}
        run: |
          chmod +x scripts/install-phase-leg.sh
          mkdir -p logs
          scripts/install-phase-leg.sh \
            vanilla \
            "${IMAGE_TAG}" \
            "${{ steps.install-prep.outputs.install_sh_vanilla }}" \
            logs/install-vanilla.log \
            "${INSTALLER_VERSION}"

      - name: Run tt-installer (patched)
        id: install-patched
        # Only OSes with installer patches need this leg. For the rest,
        # the renderer synthesises the "with patches" cell from the
        # vanilla result and tags it as "(no patches)".
        if: steps.install-prep.outcome == 'success' && steps.install-prep.outputs.install_patch_count != '0'
        continue-on-error: true
        env:
          IMAGE_TAG:         ${{ steps.os.outputs.image_tag }}
          INSTALLER_VERSION: ${{ env.TT_INSTALLER_VERSION }}
        run: |
          chmod +x scripts/install-phase-leg.sh
          mkdir -p logs
          scripts/install-phase-leg.sh \
            patched \
            "${IMAGE_TAG}" \
            "${{ steps.install-prep.outputs.install_sh_patched }}" \
            logs/install-patched.log \
            "${INSTALLER_VERSION}"

      - name: Cache matrix ttsim artifacts
        if: steps.artifacts.outcome == 'success'
        uses: actions/cache@v5
        with:
          path: |
            ttsim-cache
            tt-metal/tt_metal/tt-llk/tests/sfpi
          key: ${{ runner.os }}-${{ matrix.target_os }}-ttsim-matrix-${{ hashFiles('tt-metal/tt_metal/tt-llk/tests/ttsim-version', 'tt-metal/tt_metal/tt-llk/tests/sfpi-version') }}

      - name: Run ttsim runtime smoke (experimental)
        id: runtime-smoke
        if: steps.artifacts.outcome == 'success'
        continue-on-error: true
        env:
          IMAGE_TAG: ${{ steps.os.outputs.image_tag }}
          TARGET_OS: ${{ matrix.target_os }}
          TTSIM_TEST_TARGET: test_risc_compute.py::test_risc_compute
        run: |
          set -u
          mkdir -p logs ttsim-cache
          echo "::group::Experimental ttsim runtime smoke"
          set +e
          docker run --rm \
            -v "${PWD}/tt-metal:/workspace/tt-metal" \
            -v "${PWD}/scripts:/workspace/scripts:ro" \
            -v "${PWD}/ttsim-cache:/workspace/ttsim-cache" \
            -w /workspace/tt-metal \
            -e TT_METAL_HOME=/workspace/tt-metal \
            -e TTSIM_CACHE_DIR=/workspace/ttsim-cache \
            -e TTSIM_ARCHITECTURE=blackhole \
            -e TTSIM_TIMEOUT_SECONDS=300 \
            -e TTSIM_TEST_TARGET="${TTSIM_TEST_TARGET}" \
            -e TTSIM_REPORT_NAME="ttsim-matrix-${TARGET_OS}" \
            "${IMAGE_TAG}" \
            bash -lc '
              set -eux
              git config --global --add safe.directory "*"
              if command -v apt-get >/dev/null 2>&1; then
                apt-get update
                DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
                  python3 curl ca-certificates sudo
              elif command -v dnf >/dev/null 2>&1; then
                dnf install -y --allowerasing python3 curl ca-certificates sudo
              else
                echo "::error::no supported package manager (apt-get/dnf) found" >&2
                exit 1
              fi
              python_version="$(python3 -c "import sys; print(f\"{sys.version_info.major}.{sys.version_info.minor}\")")"
              echo "__TTMCDM_RUNTIME_PYTHON_VERSION=${python_version}"
              ./install_dependencies.sh
              bash /workspace/scripts/ttsim-smoke.sh /workspace/tt-metal
            ' 2>&1 | tee logs/runtime.log
          runtime_rc=${PIPESTATUS[0]}
          set -e
          echo "__TTMCDM_RUNTIME_RC=${runtime_rc}" | tee -a logs/runtime.log
          runtime_marker_status="$(sed -n 's/^__TTMCDM_RUNTIME_STATUS=//p' logs/runtime.log | tail -n1)"
          runtime_skip_reason="$(sed -n 's/^__TTMCDM_RUNTIME_SKIP_REASON=//p' logs/runtime.log | tail -n1)"
          runtime_python_version="$(sed -n 's/^__TTMCDM_RUNTIME_PYTHON_VERSION=//p' logs/runtime.log | tail -n1)"
          runtime_status="failure"
          if [ "${runtime_marker_status}" = "na" ]; then
            runtime_status="na"
            runtime_rc=""
            echo "experimental ttsim runtime smoke skipped (${runtime_skip_reason})"
          elif grep -q "Only Python 3.10 is supported" logs/runtime.log; then
            runtime_status="na"
            runtime_rc=""
            runtime_skip_reason="python-3.10-required"
            echo "experimental ttsim runtime smoke skipped (${runtime_skip_reason})"
          elif [ "${runtime_rc}" -eq 0 ]; then
            runtime_status="success"
          else
            echo "::warning::experimental ttsim runtime smoke failed (rc=${runtime_rc})"
          fi
          mkdir -p logs/ttsim-results
          cp -a tt-metal/tt_metal/tt-llk/tests/python_tests/ttsim_results/. logs/ttsim-results/ 2>/dev/null || true
          echo "runtime_status=${runtime_status}" >> "$GITHUB_OUTPUT"
          echo "runtime_rc=${runtime_rc}" >> "$GITHUB_OUTPUT"
          echo "runtime_target=${TTSIM_TEST_TARGET}" >> "$GITHUB_OUTPUT"
          echo "runtime_skip_reason=${runtime_skip_reason}" >> "$GITHUB_OUTPUT"
          echo "runtime_python_version=${runtime_python_version}" >> "$GITHUB_OUTPUT"
          echo "::endgroup::"

      - name: Write status JSON
        if: always()
        run: |
          set -eu
          mkdir -p logs
          status="${{ job.status }}"
          vanilla="${{ steps.build.outputs.vanilla_status }}"
          vanilla_failure_stage="${{ steps.build.outputs.vanilla_failure_stage }}"
          patch_count="${{ steps.build.outputs.patch_count }}"
          patch_status_patched="${{ steps.build.outputs.patch_status }}"
          deps_status_patched="${{ steps.build.outputs.deps_status }}"
          build_status_patched="${{ steps.build.outputs.build_status }}"
          failure_stage="${{ steps.build.outputs.failure_stage }}"
          artifact_status="${{ steps.artifacts.outcome }}"
          # New per-leg install fields.
          install_status_vanilla="${{ steps.install-vanilla.outputs.install_status_vanilla }}"
          install_repo_present_vanilla="${{ steps.install-vanilla.outputs.install_repo_present_vanilla }}"
          install_repo_files_vanilla="${{ steps.install-vanilla.outputs.install_repo_files_vanilla }}"
          install_rc_vanilla="${{ steps.install-vanilla.outputs.install_installer_rc_vanilla }}"
          install_status_patched="${{ steps.install-patched.outputs.install_status_patched }}"
          install_repo_present_patched="${{ steps.install-patched.outputs.install_repo_present_patched }}"
          install_repo_files_patched="${{ steps.install-patched.outputs.install_repo_files_patched }}"
          install_rc_patched="${{ steps.install-patched.outputs.install_installer_rc_patched }}"
          install_patch_count="${{ steps.install-prep.outputs.install_patch_count }}"
          install_patch_dir="${{ steps.install-prep.outputs.patch_dir }}"
          argbash_version="${{ steps.install-prep.outputs.argbash_version }}"
          installer_version="${{ env.TT_INSTALLER_VERSION }}"
          runtime_status="${{ steps.runtime-smoke.outputs.runtime_status }}"
          runtime_rc="${{ steps.runtime-smoke.outputs.runtime_rc }}"
          runtime_target="${{ steps.runtime-smoke.outputs.runtime_target }}"
          runtime_skip_reason="${{ steps.runtime-smoke.outputs.runtime_skip_reason }}"
          runtime_python_version="${{ steps.runtime-smoke.outputs.runtime_python_version }}"

          # Defaults if the build step did not run far enough to set
          # outputs (e.g. checkout failed).
          vanilla="${vanilla:-na}"
          vanilla_failure_stage="${vanilla_failure_stage:-na}"
          patch_count="${patch_count:-0}"
          patch_status_patched="${patch_status_patched:-skipped}"
          deps_status_patched="${deps_status_patched:-skipped}"
          build_status_patched="${build_status_patched:-skipped}"
          artifact_status="${artifact_status:-skipped}"
          failure_stage="${failure_stage:-na}"
          if [ "${artifact_status}" = "failure" ] && [ "${failure_stage}" = "na" ]; then
            failure_stage="verify"
          fi
          install_status_vanilla="${install_status_vanilla:-na}"
          install_status_patched="${install_status_patched:-na}"
          install_patch_count="${install_patch_count:-0}"
          runtime_status="${runtime_status:-na}"
          runtime_target="${runtime_target:-test_risc_compute.py::test_risc_compute}"
          runtime_skip_reason="${runtime_skip_reason:-}"
          runtime_python_version="${runtime_python_version:-}"
          runtime_failure_stage="na"
          if [ "${runtime_status}" = "failure" ]; then
            runtime_failure_stage="runtime"
          fi

          json_bool_or_null() {
            case "$1" in
              true)  printf 'true' ;;
              false) printf 'false' ;;
              *)     printf 'null' ;;
            esac
          }
          json_int_or_null() {
            if [ -z "$1" ]; then
              printf 'null'
            else
              printf '%s' "$1"
            fi
          }

          irp_v_json=$(json_bool_or_null "${install_repo_present_vanilla}")
          irp_p_json=$(json_bool_or_null "${install_repo_present_patched}")
          rc_v_json=$(json_int_or_null "${install_rc_vanilla}")
          rc_p_json=$(json_int_or_null "${install_rc_patched}")
          runtime_rc_json=$(json_int_or_null "${runtime_rc}")

          # Backward-compat aliases (one cycle): mirror the vanilla
          # leg into the legacy install_* keys so existing artifacts
          # mixing old + new schema continue to render.
          legacy_install_status="${install_status_vanilla}"
          legacy_install_repo_present_json="${irp_v_json}"
          legacy_install_repo_files="${install_repo_files_vanilla}"
          legacy_install_rc_json="${rc_v_json}"

          cat > logs/status.json <<EOF
          {
            "target_os": "${{ matrix.target_os }}",
            "distro":    "${{ steps.os.outputs.distro }}",
            "version":   "${{ steps.os.outputs.version }}",
            "tt_metal_repo": "${{ inputs.tt_metal_repo || 'tenstorrent/tt-metal' }}",
            "tt_metal_ref":  "${{ inputs.tt_metal_ref || 'main' }}",
            "tt_metal_sha":  "${{ steps.ttmetal.outputs.sha }}",
            "run_id":   "${{ github.run_id }}",
            "run_url":  "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "status":   "${status}",
            "vanilla_status": "${vanilla}",
            "vanilla_failure_stage": "${vanilla_failure_stage}",
            "patch_count":    ${patch_count},
            "patch_status_patched": "${patch_status_patched}",
            "deps_status_patched":  "${deps_status_patched}",
            "build_status_patched": "${build_status_patched}",
            "artifact_status":      "${artifact_status}",
            "failure_stage":        "${failure_stage}",
            "install_status_vanilla":       "${install_status_vanilla}",
            "install_repo_present_vanilla": ${irp_v_json},
            "install_repo_files_vanilla":   "${install_repo_files_vanilla}",
            "install_installer_rc_vanilla": ${rc_v_json},
            "install_status_patched":       "${install_status_patched}",
            "install_repo_present_patched": ${irp_p_json},
            "install_repo_files_patched":   "${install_repo_files_patched}",
            "install_installer_rc_patched": ${rc_p_json},
            "install_patch_count":          ${install_patch_count},
            "install_patch_dir":            "${install_patch_dir}",
            "argbash_version":              "${argbash_version}",
            "installer_version":            "${installer_version}",
            "runtime_status":               "${runtime_status}",
            "runtime_failure_stage":        "${runtime_failure_stage}",
            "runtime_smoke_target":         "${runtime_target}",
            "runtime_smoke_architecture":   "blackhole",
            "runtime_smoke_rc":             ${runtime_rc_json},
            "runtime_skip_reason":          "${runtime_skip_reason}",
            "runtime_python_version":       "${runtime_python_version}",
            "install_status":        "${legacy_install_status}",
            "install_repo_present":  ${legacy_install_repo_present_json},
            "install_repo_files":    "${legacy_install_repo_files}",
            "install_installer_rc":  ${legacy_install_rc_json},
            "artifact_dir": "${{ steps.artifacts.outputs.found_dir }}"
          }
          EOF
          cat logs/status.json

      - name: Upload logs and status
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: build-${{ matrix.target_os }}-${{ github.run_id }}
          path: |
            logs/
            os-release.txt
          if-no-files-found: warn
          retention-days: 30

  update-compat-table:
    name: Update README compatibility table
    needs: [setup, build]
    if: always() && (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.target_os == 'all'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: _artifacts
          # default merge-multiple: false -> each artifact lives in its own subdir,
          # which is what update_compat_table.py expects.

      - name: Refresh compatibility table
        run: |
          set -eu
          python3 scripts/update_compat_table.py \
            --artifacts-dir _artifacts \
            --history-dir history \
            --require-os linuxmint-21.3 linuxmint-22.1 linuxmint-22.2 linuxmint-22.3 ubuntu-26.04 rocky-9 rocky-10 debian-12 debian-13

      - name: Show diff
        run: |
          git --no-pager diff --stat -- README.md history || true
          git --no-pager diff -- README.md history || true

      - name: Open PR if README changed
        uses: peter-evans/create-pull-request@v8
        with:
          branch: bot/update-compat-table
          base: main
          title: "chore: refresh compatibility table and history (run ${{ github.run_id }})"
          commit-message: |
            chore: refresh compatibility table and history from run ${{ github.run_id }}

            Auto-generated by .github/workflows/build-tt-metal.yaml.
          body: |
            Auto-generated from workflow run [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).

            This PR refreshes the generated README compatibility and history summary blocks, then persists `history/` JSON snapshots and the static history SVG based on the per-OS `status.json` files produced by the matrix build.
          delete-branch: true
          add-paths: |
            README.md
            history/**
          author: "tt-metal-community-bot <bot@users.noreply.github.com>"
          committer: "tt-metal-community-bot <bot@users.noreply.github.com>"

  notify-failure:
    name: Notify full-matrix failure
    needs: [setup, build]
    if: >-
      always() &&
      (github.event_name == 'schedule' ||
       (github.event_name == 'workflow_dispatch' && inputs.target_os == 'all')) &&
      (needs.setup.result == 'failure' || needs.build.result == 'failure')
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      issues: write
    steps:
      - name: Open or update failure issue
        uses: actions/github-script@v9
        env:
          TARGET_OS: ${{ inputs.target_os || 'all' }}
          TT_METAL_REPO: ${{ inputs.tt_metal_repo || 'tenstorrent/tt-metal' }}
          TT_METAL_REF: ${{ inputs.tt_metal_ref || 'main' }}
          SETUP_RESULT: ${{ needs.setup.result }}
          BUILD_RESULT: ${{ needs.build.result }}
        with:
          script: |
            const marker = '<!-- ttmcdm-ci-failure:build-tt-metal:full-matrix -->';
            const title = 'CI failure: full-matrix build-tt-metal';
            const {owner, repo} = context.repo;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;

            const jobs = await github.paginate(github.rest.actions.listJobsForWorkflowRun, {
              owner,
              repo,
              run_id: context.runId,
              per_page: 100,
            });
            const failedJobs = jobs
              .filter((job) =>
                job.name !== 'Notify full-matrix failure' &&
                job.status === 'completed' &&
                job.conclusion &&
                job.conclusion !== 'success' &&
                job.conclusion !== 'skipped'
              )
              .map((job) => `- ${job.name}: ${job.conclusion} (${job.html_url})`);

            const failedJobsText = failedJobs.length
              ? failedJobs.join('\n')
              : `- setup: ${process.env.SETUP_RESULT}\n- build: ${process.env.BUILD_RESULT}`;

            const details = [
              marker,
              '',
              'A scheduled or full-matrix tt-metal compatibility run failed.',
              '',
              `- Run: ${runUrl}`,
              `- Event: ${context.eventName}`,
              `- Target OS: ${process.env.TARGET_OS}`,
              `- tt-metal repo: ${process.env.TT_METAL_REPO}`,
              `- tt-metal ref: ${process.env.TT_METAL_REF}`,
              `- setup result: ${process.env.SETUP_RESULT}`,
              `- build result: ${process.env.BUILD_RESULT}`,
              '',
              'Failed jobs:',
              failedJobsText,
              '',
              'Next steps:',
              '1. Inspect the failed job logs; when build jobs ran, also inspect uploaded `status.json` artifacts.',
              '2. If a bot README/history PR exists, review whether it should be merged as the current compatibility state.',
              '3. For setup-level failures or early build failures with no bot PR, triage directly from the logs and rerun or fix as needed.',
              '4. Leave this issue open until a maintainer has triaged the failure; green follow-up runs do not auto-close it.',
            ].join('\n');

            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'open',
              per_page: 100,
            });
            const existing = openIssues.find((issue) =>
              !issue.pull_request && issue.title === title
            );

            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body: [
                  marker,
                  '',
                  'Another scheduled or full-matrix tt-metal compatibility run failed.',
                  '',
                  details.replace(marker + '\n\n', ''),
                ].join('\n'),
              });
              core.info(`Updated existing failure issue #${existing.number}`);
            } else {
              const created = await github.rest.issues.create({
                owner,
                repo,
                title,
                body: details,
              });
              core.info(`Created failure issue #${created.data.number}`);
            }
